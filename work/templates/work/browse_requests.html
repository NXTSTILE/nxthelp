{% extends "base.html" %}
{% block title %}Browse Requests{% endblock %}

{% block content %}
<div class="feed-container">
    <!-- Clean Minimalist Filters -->
    <div class="mb-6 px-4 md:px-0">
        <form method="GET" action="{% url 'browse_requests' %}" id="filter-form" class="flex flex-col gap-3">
            <div class="ig-search-container w-full">
                <i class="fas fa-search text-slate-400"></i>
                <input type="text" name="q" value="{{ search_query }}" placeholder="Search help requests..." class="ig-search-input">
            </div>
            
            <div class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                <select name="category" class="text-sm border border-slate-200 rounded-lg px-3 py-1 bg-white focus:outline-none" onchange="this.form.submit()">
                    <option value="">All Categories</option>
                    {% for cat in categories %}
                    <option value="{{ cat.slug }}" {% if current_category == cat.slug %}selected{% endif %}>{{ cat.name }}</option>
                    {% endfor %}
                </select>
                <select name="urgency" class="text-sm border border-slate-200 rounded-lg px-3 py-1 bg-white focus:outline-none" onchange="this.form.submit()">
                    <option value="">Urgency</option>
                    <option value="low" {% if current_urgency == 'low' %}selected{% endif %}>Low</option>
                    <option value="medium" {% if current_urgency == 'medium' %}selected{% endif %}>Medium</option>
                    <option value="high" {% if current_urgency == 'high' %}selected{% endif %}>High</option>
                </select>
            </div>
        </form>
    </div>

    <div id="requests-list-container" class="transition-opacity duration-200">
        {% include "work/partials/requests_list.html" %}
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const filterForm = document.getElementById('filter-form');
    const container = document.getElementById('requests-list-container');
    const searchInput = filterForm.querySelector('input[name="q"]');
    let searchTimeout = null;

    function fetchRequests(url) {
        container.style.opacity = '0.5';
        fetch(url, { headers: { 'X-Requested-With': 'XMLHttpRequest' } })
        .then(response => response.text())
        .then(html => {
            container.innerHTML = html;
            container.style.opacity = '1';
        })
        .catch(err => {
            console.error('Error fetching requests:', err);
            container.style.opacity = '1';
        });
    }

    function updateResults() {
        const url = new URL(filterForm.action, window.location.origin);
        const formData = new FormData(filterForm);
        for (const [key, value] of formData.entries()) {
            if (value) url.searchParams.append(key, value);
        }
        window.history.pushState({}, '', url);
        fetchRequests(url);
    }

    searchInput.addEventListener('input', function() {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(updateResults, 300);
    });

    filterForm.addEventListener('submit', function(e) {
        e.preventDefault();
        updateResults();
    });

    container.addEventListener('click', function(e) {
        const link = e.target.closest('.ajax-page-link');
        if (link) {
            e.preventDefault();
            const page = link.getAttribute('data-page');
            const url = new URL(window.location.href);
            url.searchParams.set('page', page);
            window.history.pushState({}, '', url);
            fetchRequests(url);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    });
});
</script>
{% endblock %}
