{% extends "base.html" %}
{% block title %}Explore Requests{% endblock %}

{% block content %}
<div class="mb-24">
    <h1 class="serif-display" style="font-size: 32px; margin-bottom: 24px;">Explore <i>Requests</i></h1>
    
    <form method="GET" action="{% url 'browse_requests' %}" id="filter-form" style="display: flex; gap: 16px; margin-bottom: 32px;">
        <input type="text" name="q" value="{{ search_query }}" placeholder="Search requests..." class="form-control" style="max-width: 300px;">
        
        <select name="category" class="form-control" style="width: auto;" onchange="this.form.submit()">
            <option value="">All Categories</option>
            {% for cat in categories %}
            <option value="{{ cat.slug }}" {% if current_category == cat.slug %}selected{% endif %}>{{ cat.name }}</option>
            {% endfor %}
        </select>
        
        <select name="urgency" class="form-control" style="width: auto;" onchange="this.form.submit()">
            <option value="">Urgency</option>
            <option value="low" {% if current_urgency == 'low' %}selected{% endif %}>Low</option>
            <option value="medium" {% if current_urgency == 'medium' %}selected{% endif %}>Medium</option>
            <option value="high" {% if current_urgency == 'high' %}selected{% endif %}>High</option>
        </select>
    </form>
    
    <div id="requests-list-container">
        {% include "work/partials/requests_list.html" %}
    </div>
</div>
{% endblock %}
