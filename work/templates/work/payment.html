{% extends "base.html" %}
{% load static %}
{% block title %}Send Payment — {{ help_request.title }}{% endblock %}

{% block extra_head %}
<link rel="stylesheet" href="{% static 'css/pages/payment.css' %}">
{% endblock %}

{% block content %}
{% include "work/partials/payment/content.html" %}
{% endblock %}

{% block extra_js %}
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
window.PaymentConfig = {
    razorpayKey: "{{ razorpay_key_id|escapejs }}",
    createOrderUrl: "{% url 'create_razorpay_order' pk=help_request.pk %}",
    csrfToken: "{{ csrf_token|escapejs }}",
    payerName: "{{ request.user.get_full_name|default:request.user.username|escapejs }}",
    payerEmail: "{{ request.user.email|escapejs }}",
    helpTitle: "{{ help_request.title|truncatechars:50|escapejs }}"
};
</script>
<script src="{% static 'js/pages/payment.js' %}"></script>
{% endblock %}
