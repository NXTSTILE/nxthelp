{% extends "base.html" %}
{% block title %}Verify Email{% endblock %}

{% block content %}
<div class="feed-container flex items-center justify-center min-h-[80vh]">
    <div class="w-full max-w-[350px] bg-white border border-slate-300 p-8 flex flex-col items-center mx-4 md:mx-0 rounded-sm">
        <h1 class="text-3xl font-bold mb-6 tracking-tight text-slate-900" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">NxtHelp</h1>
        
        <div class="text-center mb-6">
            <h2 class="font-semibold text-slate-900 mb-2">Verify Your Email</h2>
            <p class="text-sm text-slate-500">
                We sent a 6-digit code to <br><strong class="text-slate-800">{{ email }}</strong>.
            </p>
        </div>

        <form method="POST" action="{% url 'verify_otp' %}" novalidate class="w-full flex flex-col gap-4">
            {% csrf_token %}
            <div>
                <input type="text" name="otp" id="otp" class="w-full bg-slate-50 border border-slate-300 rounded-sm px-2 py-2 text-sm text-center tracking-widest outline-none focus:border-slate-400" 
                       placeholder="XXXXXX" autocomplete="off" maxlength="6" required>
            </div>
            <button type="submit" class="w-full bg-[#0095f6] hover:bg-[#1877f2] text-white font-semibold rounded-lg py-1.5 text-sm transition-colors mt-2">
                Verify Code
            </button>
        </form>

        <div class="flex items-center gap-3 w-full my-6">
            <div class="h-px bg-slate-300 flex-1"></div>
            <div class="text-[13px] font-semibold text-slate-500 uppercase">OR</div>
            <div class="h-px bg-slate-300 flex-1"></div>
        </div>

        <form method="POST" action="{% url 'resend_verification' %}" class="w-full">
            {% csrf_token %}
            <input type="hidden" name="email" value="{{ email }}">
            <button type="submit" class="w-full text-[#00376b] hover:text-slate-900 text-sm font-semibold flex items-center justify-center gap-1">
                <i class="fas fa-redo text-xs"></i> Resend Code
            </button>
        </form>
    </div>
</div>

<div class="w-full max-w-[350px] bg-white border border-slate-300 p-4 text-center text-sm mx-auto mt-4 rounded-sm">
    Wrong email? <a href="{% url 'register' %}" class="text-[#0095f6] font-semibold">Sign up again</a>
</div>
{% endblock %}
